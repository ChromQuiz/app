<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIQ the 13th 採点システム - 要確認</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 20px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: #4caf50;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .btn:hover {
            background: #388e3c;
        }

        .btn.secondary {
            background: #0f3460;
            border: 1px solid #444;
        }

        .btn.secondary:hover {
            background: #1a4a7a;
        }

        .counter {
            background: #e65100;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-left: auto;
        }

        .conflict-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .conflict-card {
            background: #16213e;
            border-radius: 12px;
            padding: 16px;
            border: 2px solid #ff9800;
        }

        .conflict-card.resolved {
            border-color: #4caf50;
            opacity: 0.6;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .q-tag {
            background: #0f3460;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
        }

        .entry-tag {
            background: #1a237e;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 13px;
        }

        .answer-img {
            width: 100%;
            height: 80px;
            object-fit: contain;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .model-answer {
            background: #1b5e20;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            color: #a5d6a7;
            margin-bottom: 10px;
            text-align: center;
        }

        .scorer-votes {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 12px;
        }

        .vote-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            background: #0f3460;
        }

        .vote-correct {
            color: #4caf50;
            font-weight: bold;
        }

        .vote-wrong {
            color: #ef5350;
            font-weight: bold;
        }

        .final-btns {
            display: flex;
            gap: 8px;
        }

        .final-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            transition: all 0.15s;
        }

        .final-btn.correct-btn {
            background: #333;
            color: #4caf50;
            border-color: #333;
        }

        .final-btn.correct-btn:hover {
            background: #1b5e20;
            border-color: #4caf50;
        }

        .final-btn.wrong-btn {
            background: #333;
            color: #ef5350;
            border-color: #333;
        }

        .final-btn.wrong-btn:hover {
            background: #b71c1c;
            border-color: #ef5350;
        }

        .final-btn.selected-correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .final-btn.selected-wrong {
            background: #ef5350;
            color: white;
            border-color: #ef5350;
        }

        .no-conflict {
            text-align: center;
            padding: 60px;
            color: #aaa;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <button class="btn secondary" onclick="location.href='judge.html'">← 一覧へ</button>
        <h1>要確認一覧</h1>
        <div class="counter" id="counter">読み込み中...</div>
    </div>

    <div id="conflict-grid" class="conflict-grid">
        <div class="loading">読み込み中...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDk-RpKCX5Hd-xNnrso_x5fd3S-vUoWKUc",
            authDomain: "ciq-saiten.firebaseapp.com",
            databaseURL: "https://ciq-saiten-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ciq-saiten",
            storageBucket: "ciq-saiten.firebasestorage.app",
            messagingSenderId: "987606904586",
            appId: "1:987606904586:web:b16876b8963a55a60d94f3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const scorerRole = sessionStorage.getItem('scorer_role');
        if (scorerRole !== 'admin') {
            alert('管理者のみアクセスできます');
            location.href = 'judge.html';
        }

        let answersData = {};
        let answersText = {};
        let scoresData = {};
        let entryNumbers = [];

        async function init() {
            const answersSnap = await db.ref('answers').get();
            if (answersSnap.exists()) {
                answersData = answersSnap.val();
                entryNumbers = Object.keys(answersData).map(Number).sort((a, b) => a - b);
            }

            const answersTextSnap = await db.ref('answers_text').get();
            if (answersTextSnap.exists()) {
                answersText = answersTextSnap.val();
            }

            db.ref('scores').on('value', snap => {
                scoresData = snap.val() || {};
                render();
            });
        }

        function render() {
            const conflicts = [];

            for (let q = 1; q <= 100; q++) {
                const completedScorers = Object.keys(scoresData[`__completed__q${q}`] || {});
                if (completedScorers.length < 3) continue;

                entryNumbers.forEach(entryNum => {
                    const qScores = scoresData[entryNum]?.[`q${q}`] || {};
                    const entries = Object.entries(qScores);
                    const corrects = entries.filter(([, v]) => v === 'correct').length;
                    const wrongs = entries.filter(([, v]) => v === 'wrong').length;

                    if (corrects > 0 && wrongs > 0) {
                        const finalResult = scoresData[`__final__q${q}`]?.[entryNum];
                        conflicts.push({ q, entryNum, qScores, finalResult });
                    }
                });
            }

            const unresolvedCount = conflicts.filter(c => !c.finalResult).length;
            document.getElementById('counter').textContent =
                `未確定 ${unresolvedCount}件 / 全${conflicts.length}件`;

            const grid = document.getElementById('conflict-grid');

            if (conflicts.length === 0) {
                grid.innerHTML = '<div class="no-conflict">✅ 要確認はありません</div>';
                return;
            }

            grid.innerHTML = '';
            conflicts.forEach(({ q, entryNum, qScores, finalResult }) => {
                const imageData = answersData[entryNum]?.cells[`q${q}`];
                const modelAnswer = answersText[q] || '';

                const card = document.createElement('div');
                card.className = `conflict-card ${finalResult ? 'resolved' : ''}`;

                const votesHtml = Object.entries(qScores).map(([name, val]) => `
          <div class="vote-item">
            <span>${name}</span>
            <span class="${val === 'correct' ? 'vote-correct' : 'vote-wrong'}">
              ${val === 'correct' ? '○' : '×'}
            </span>
          </div>
        `).join('');

                card.innerHTML = `
          <div class="card-header">
            <div class="q-tag">${q}問</div>
            <div class="entry-tag">受付番号 ${entryNum}</div>
          </div>
          <img class="answer-img" src="${imageData || ''}" alt="${entryNum}番 ${q}問" />
          ${modelAnswer ? `<div class="model-answer">${modelAnswer}</div>` : ''}
          <div class="scorer-votes">${votesHtml}</div>
          <div class="final-btns">
            <button class="final-btn correct-btn ${finalResult === 'correct' ? 'selected-correct' : ''}"
              onclick="setFinal(${q}, ${entryNum}, 'correct')">○</button>
            <button class="final-btn wrong-btn ${finalResult === 'wrong' ? 'selected-wrong' : ''}"
              onclick="setFinal(${q}, ${entryNum}, 'wrong')">×</button>
          </div>
        `;
                grid.appendChild(card);
            });
        }

        async function setFinal(q, entryNum, result) {
            await db.ref(`scores/__final__q${q}/${entryNum}`).set(result);
        }

        init();
    </script>
</body>

</html>
