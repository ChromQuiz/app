<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'self'; img-src 'self' data: blob: https://*.supabase.co;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" href="favicon.png?v=3">
    <meta name="description" content="CIQ - クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:title" content="CIQ - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="og-image.png">
    <title>CIQ - 要確認</title>
    <script defer src="js/config.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.1/dist/umd/supabase.min.js" integrity="sha384-fx4y4cDx8NYfissnVzdGJY3yVXWY3rn5ab5HTUjpvgT35oDiyAbjjqnLhnRmESNE" crossorigin="anonymous"></script>
    <script defer src="js/supabase_config.js"></script>
    <script defer src="js/supabase_client.js"></script>
    <script defer src="js/supabase_api.js?v=34"></script>
    <script defer src="js/crypto.js"></script>
    <script defer src="js/icons.js?v=6"></script>
    <script defer src="js/ui.js?v=6"></script>
    <script defer src="js/custom-select.js?v=5"></script>
    <script defer src="js/shared.js"></script>
    <link rel="stylesheet" href="css/design_system.css?v=39">
    <link rel="stylesheet" href="css/pages.css?v=63">
</head>

<body class="page-conflict">
    <div class="fixed-header">
        <div class="header-left">
            <button class="back-nav-btn" id="conflict-back-btn" type="button"><span data-icon="chevron-left" aria-hidden="true"></span> 運営へ</button>
        </div>
        <div class="header-center">
            <h1><span data-icon="triangle-exclamation" aria-hidden="true"></span> 要確認</h1>
        </div>
        <div class="header-right">
            <div class="counter has-conflicts" id="counter" role="status" aria-live="polite" aria-label="要確認件数"><span data-icon="spinner" aria-hidden="true"></span> 読み込み中...</div>
        </div>
    </div>

    <div id="conflict-grid" class="answer-grid conflict-grid" role="grid" aria-label="要確認解答一覧">
        <div class="loading-state u-grid-span-all"><span data-icon="spinner" aria-hidden="true"></span> 読み込み中...</div>
    </div>

    <div class="kbd-hint conflict-kbd-hint" aria-hidden="true">
        <span><kbd>M</kbd> 正解</span>
        <span><kbd>X</kbd> 不正解</span>
        <span><kbd>←→</kbd> 移動</span>
    </div>

    <div class="action-bar conflict-action-bar u-hidden" id="conflict-action-bar" role="toolbar" aria-label="要確認の判定">
        <button class="btn score-correct" id="conflict-correct-btn" type="button"><span data-icon="check" aria-hidden="true"></span><span>正解</span></button>
        <button class="btn score-wrong" id="conflict-wrong-btn" type="button"><span data-icon="xmark" aria-hidden="true"></span><span>不正解</span></button>
    </div>



    <script defer src="js/conflict.js?v=39"></script>
</body>

</html>
