<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'self'; img-src 'self' data: blob: https://*.supabase.co;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="CIQ - クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:title" content="CIQ - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="og-image.png">
    <title>CIQ - 採点</title>
    <script defer src="js/config.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="js/supabase_config.js"></script>
    <script defer src="js/supabase_client.js"></script>
    <script defer src="js/supabase_api.js?v=27"></script>
    <script defer src="js/crypto.js"></script>
    <script defer src="js/icons.js?v=2"></script>
    <script defer src="js/ui.js?v=4"></script>
    <script defer src="js/custom-select.js?v=3"></script>
    <script defer src="js/shared.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="css/design_system.css?v=24">
    <link rel="stylesheet" href="css/pages.css?v=38">
</head>

<body>
    <div class="fixed-header">
        <div class="header-left">
            <button class="back-nav-btn" id="question-back-btn" type="button"><span data-icon="chevron-left" aria-hidden="true"></span> 一覧へ</button>
        </div>
        <div class="header-center">
            <div class="q-badge" id="q-badge" aria-label="問題番号">- 問</div>
            <div class="answer-badge" id="answer-badge" aria-label="模範解答">...</div>
        </div>
        <div class="header-right">
            <div class="progress-text" id="progress-text" aria-live="polite"></div>
        </div>
    </div>

    <div class="answer-grid" id="answer-grid" role="grid" aria-label="解答カード一覧">
        <div class="loading-state u-grid-span-all"><span data-icon="spinner" aria-hidden="true"></span> 読み込み中...</div>
    </div>

    <div class="kbd-hint" aria-hidden="true">
        <span><kbd>M</kbd> 正解</span>
        <span><kbd>X</kbd> 不正解</span>
        <span><kbd>H</kbd> 保留</span>
        <span><kbd>←→</kbd> 移動</span>
    </div>

    <div class="action-bar" id="mobile-action-bar" role="toolbar" aria-label="採点アクション">
        <button class="btn score-correct" id="score-correct-btn" type="button"><span data-icon="check" aria-hidden="true"></span><span>正解</span></button>
        <button class="btn score-wrong" id="score-wrong-btn" type="button"><span data-icon="xmark" aria-hidden="true"></span><span>不正解</span></button>
        <button class="btn score-hold" id="score-hold-btn" type="button"><span data-icon="triangle-exclamation" aria-hidden="true"></span><span>保留</span></button>
    </div>



    <script defer src="js/question.js?v=40"></script>
</body>

</html>
