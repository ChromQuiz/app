<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'self'; img-src 'self' data: blob: https://*.supabase.co;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="CIQ - クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:title" content="CIQ - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="og-image.png">
    <title>CIQ - 採点</title>
    <script defer src="js/config.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="js/supabase_config.js"></script>
    <script defer src="js/supabase_client.js"></script>
    <script defer src="js/supabase_api.js?v=27"></script>
    <script defer src="js/crypto.js"></script>
    <script defer src="js/ui.js?v=2"></script>
    <script defer src="js/custom-select.js?v=2"></script>
    <script defer src="js/shared.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Noto+Sans+JP:wght@400;500;600;800&display=swap">
    <link rel="stylesheet" href="css/design_system.css?v=22">
    <link rel="stylesheet" href="css/pages.css?v=35">
</head>

<body>
    <div class="fixed-header">
        <div class="header-left">
            <button class="back-nav-btn" id="question-back-btn" type="button"><i class="fa-solid fa-chevron-left" aria-hidden="true"></i> 一覧へ</button>
        </div>
        <div class="header-center">
            <div class="q-badge" id="q-badge" aria-label="問題番号">- 問</div>
            <div class="answer-badge" id="answer-badge" aria-label="模範解答">...</div>
        </div>
        <div class="header-right">
            <div class="progress-text" id="progress-text" aria-live="polite"></div>
        </div>
    </div>

    <div class="answer-grid" id="answer-grid" role="grid" aria-label="解答カード一覧">
        <div class="loading-state u-grid-span-all"><i class="fa-solid fa-spinner fa-spin" aria-hidden="true"></i> 読み込み中...</div>
    </div>

    <div class="action-bar" id="mobile-action-bar" role="toolbar" aria-label="採点アクション">
        <button class="btn score-correct" id="score-correct-btn" type="button"><i class="fa-solid fa-check" aria-hidden="true"></i><span>正解</span></button>
        <button class="btn score-wrong" id="score-wrong-btn" type="button"><i class="fa-solid fa-xmark" aria-hidden="true"></i><span>不正解</span></button>
        <button class="btn score-hold" id="score-hold-btn" type="button"><i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i><span>保留</span></button>
    </div>



    <script defer src="js/question.js?v=40"></script>
</body>

</html>
