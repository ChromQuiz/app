<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'self'; img-src 'self' data: blob: https://*.supabase.co;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="CIQ - クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:title" content="CIQ - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="og-image.png">
    <title>CIQ - 採点</title>
    <script defer src="js/config.js"></script>
    <script defer src="js/config.local.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="js/supabase_config.js"></script>
    <script defer src="js/supabase_client.js"></script>
    <script defer src="js/supabase_api.js"></script>
    <script defer src="js/crypto.js"></script>
    <script defer src="js/ui.js?v=1"></script>
    <script defer src="js/custom-select.js"></script>
    <script defer src="js/shared.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=Noto+Sans+JP:wght@400;500;600;800&display=swap">
    <link rel="stylesheet" href="css/design_system.css?v=19">
    <link rel="stylesheet" href="css/pages.css?v=19">
</head>

<body>
    <div class="fixed-header">
        <div class="header-left">
            <button class="back-nav-btn" onclick="location.href='judge.html'"><i class="fa-solid fa-chevron-left"></i> 一覧へ</button>
        </div>
        <div class="header-center">
            <div class="q-badge" id="q-badge">- 問</div>
            <div class="answer-badge" id="answer-badge">...</div>
        </div>
        <div class="header-right">
            <div class="progress-text" id="progress-text"></div>
        </div>
    </div>

    <div class="answer-grid" id="answer-grid">
        <div class="loading-state" style="grid-column:1/-1"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</div>
    </div>

    <div class="mobile-action-bar" id="mobile-action-bar">
        <button class="btn score-correct" onclick="scoreSelected('correct')"><i class="fa-solid fa-check"></i><span>正解</span></button>
        <button class="btn score-wrong" onclick="scoreSelected('wrong')"><i class="fa-solid fa-xmark"></i><span>不正解</span></button>
        <button class="btn score-hold" onclick="scoreSelected('hold')"><i class="fa-solid fa-triangle-exclamation"></i><span>保留</span></button>
    </div>



    <script defer src="js/question.js?v=9"></script>
</body>

</html>
