<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'self'; img-src 'self' data: blob:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="CIQ - クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:title" content="CIQ - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="og-image.png">
    <title>CIQ - キャンセルフォーム</title>
    <script defer src="js/config.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="js/supabase_config.js"></script>
    <script defer src="js/supabase_client.js"></script>
    <script defer src="js/supabase_api.js?v=5"></script>
    <script defer src="js/crypto.js"></script>
    <script defer src="js/icons.js?v=3"></script>
    <script defer src="js/ui.js?v=4"></script>
    <script defer src="js/custom-select.js?v=4"></script>
    <script defer src="js/shared.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="css/design_system.css?v=31">
    <link rel="stylesheet" href="css/pages.css?v=42">
</head>
<body class="page-wrapper">
    <div class="page-container">
        <div class="page-logo">
            <span class="logo-icon"><span data-icon="user-xmark" aria-hidden="true"></span></span>
            <h1 id="cancel-title"><span data-icon="spinner" aria-hidden="true"></span> 読み込み中...</h1>
            <div class="logo-sub" id="cancel-subtitle">キャンセルフォーム</div>
        </div>

        <form class="page-card" id="form-card" novalidate>
            <div class="form-group">
                <label for="f-email"><span data-icon="envelope" aria-hidden="true"></span> メールアドレス</label>
                <input type="email" class="page-input" id="f-email" name="email" required autocomplete="email" placeholder="name@example.com" inputmode="email" pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$" title="メールアドレスの形式で入力してください">
            </div>

            <div class="form-group">
                <label for="f-password"><span data-icon="key" aria-hidden="true"></span> パスワード</label>
                <input type="text" class="page-input" id="f-password" name="password" required autocomplete="off" placeholder="------">
            </div>

            <div class="warning-box" role="note">
                <span data-icon="triangle-exclamation" aria-hidden="true"></span> キャンセルは取り消せません。
            </div>

            <button type="submit" class="page-btn danger" id="submit-btn"><span data-icon="trash" aria-hidden="true"></span> キャンセルを確定する</button>
            <div class="page-msg" id="status-msg" role="status" aria-live="polite"></div>
        </form>

        <div class="page-footer">Powered by CIQ</div>
    </div>

    <script defer src="js/email.js?v=2"></script>
    <script defer src="js/cancel.js?v=4"></script>
</body>
</html>
