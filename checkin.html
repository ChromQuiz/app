<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'self'; img-src 'self' data: blob:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="CIQ - クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:title" content="CIQ - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="og-image.png">
    <title>CIQ - 当日受付</title>
    <script defer src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script defer src="js/config.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="js/supabase_config.js"></script>
    <script defer src="js/supabase_client.js"></script>
    <script defer src="js/supabase_api.js?v=7"></script>
    <script defer src="js/crypto.js"></script>
    <script defer src="js/icons.js?v=3"></script>
    <script defer src="js/ui.js?v=4"></script>
    <script defer src="js/custom-select.js?v=4"></script>
    <script defer src="js/shared.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="css/design_system.css?v=30">
    <link rel="stylesheet" href="css/pages.css?v=41">
</head>
<body>
    <div class="fixed-header">
        <div class="header-left">
            <button type="button" class="back-nav-btn" id="checkin-back-btn"><span data-icon="chevron-left" aria-hidden="true"></span> 戻る</button>
        </div>
        <div class="header-center">
            <h1 id="page-title"><span data-icon="qrcode" aria-hidden="true"></span> 当日受付</h1>
        </div>
        <div class="header-right"></div>
    </div>

    <div class="main-content">
        <div class="left-col">
            <div id="camera-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
            </div>
            <p id="scanning-text" role="status" aria-live="polite"><span data-icon="camera" aria-hidden="true"></span> QRコードをカメラにかざしてください</p>
            <div id="result" role="status" aria-live="assertive"></div>
        </div>

        <div class="right-col">
            <div class="stats-bar glass-panel u-hidden mb-zero" id="stats-bar" role="region" aria-label="受付状況">
                <h3><span data-icon="chart-bar" aria-hidden="true"></span> 受付状況</h3>
                <div class="stats-row u-flex-wrap">
                    <div class="stat-item glass-panel">
                        <div class="stat-num checkin-stat-primary" id="stat-total">-</div>
                        <div class="stat-label"><span data-icon="users" aria-hidden="true"></span> エントリー</div>
                    </div>
                    <div class="stat-item glass-panel">
                        <div class="stat-num checkin-stat-success" id="stat-checked">-</div>
                        <div class="stat-label"><span data-icon="check" aria-hidden="true"></span> 受付済み</div>
                    </div>
                    <div class="stat-item glass-panel">
                        <div class="stat-num checkin-stat-warning" id="stat-remaining">-</div>
                        <div class="stat-label"><span data-icon="clock" aria-hidden="true"></span> 未受付</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script defer src="js/checkin.js?v=5"></script>
</body>
</html>
