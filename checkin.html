<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'self'; img-src 'self' data: blob:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png?v=4">
    <meta name="description" content="CIQ - クイズ大会のペーパー運営を支援するプラットフォーム">
    <title>CIQ - 当日受付</title>
    <script defer src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js" integrity="sha384-b5Ya4Bq3qCyz39m2ISh+4DxjAIljdeFwK/BsXLuj9gugaNwAcj/ia15fxNZL9Nlx" crossorigin="anonymous"></script>
    <script defer src="js/config.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.1/dist/umd/supabase.min.js" integrity="sha384-fx4y4cDx8NYfissnVzdGJY3yVXWY3rn5ab5HTUjpvgT35oDiyAbjjqnLhnRmESNE" crossorigin="anonymous"></script>
    <script defer src="js/supabase_config.js"></script>
    <script defer src="js/supabase_client.js"></script>
    <script defer src="js/supabase_api.js?v=34"></script>
    <script defer src="js/crypto.js"></script>
    <script defer src="js/icons.js?v=8"></script>
    <script defer src="js/ui.js?v=16"></script>
    <script defer src="js/shared.js?v=2"></script>
    <link rel="stylesheet" href="css/design_system.css?v=59">
    <link rel="stylesheet" href="css/pages.css?v=100">
</head>
<body class="page-checkin">
    <!-- 集中モードシェル: 戻る + 現在位置 + 受付状況(控えめ) -->
    <div class="fixed-header ops-focus-bar">
        <div class="header-left">
            <button type="button" class="back-nav-btn icon-only" id="checkin-back-btn" aria-label="戻る" title="戻る"><span data-icon="chevron-left" aria-hidden="true"></span></button>
        </div>
        <div class="header-center">
            <h1 id="page-title">当日受付</h1>
        </div>
        <div class="header-right">
            <div class="checkin-tally u-hidden" id="stats-bar" role="status" aria-label="受付状況">
                <span class="checkin-tally-item"><span class="checkin-tally-num checkin-stat-success" id="stat-checked">-</span> 済</span>
                <span class="checkin-tally-sep" aria-hidden="true">/</span>
                <span class="checkin-tally-item"><span class="checkin-tally-num checkin-stat-warning" id="stat-remaining">-</span> 未</span>
                <span class="checkin-tally-sep" aria-hidden="true">/</span>
                <span class="checkin-tally-item"><span class="checkin-tally-num checkin-stat-primary" id="stat-total">-</span> 計</span>
            </div>
        </div>
    </div>

    <!-- 参加者が画面に向かってQRをかざす前提のレイアウト:
         左=大きなカメラ(かざす場所) / 右=大きな判定結果(参加者と担当者の両方が読む) -->
    <div class="main-content">
        <div class="left-col">
            <div id="camera-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
                <div class="checkin-guide" aria-hidden="true">
                    <div class="checkin-guide-frame"></div>
                </div>
            </div>
            <p id="scanning-text" role="status" aria-live="polite">QRコードを枠の中にかざしてください</p>
        </div>

        <div class="right-col">
            <div class="checkin-result-panel">
                <div class="checkin-result-idle" id="checkin-idle" aria-hidden="true">
                    <span data-icon="qrcode" aria-hidden="true"></span>
                    <p>読み取り待機中</p>
                </div>
                <div id="result" role="status" aria-live="assertive"></div>
            </div>
        </div>
    </div>

    <script defer src="js/checkin.js?v=10"></script>
</body>
</html>
