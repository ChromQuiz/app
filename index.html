<html lang="ja">

<head>
  <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'self'; img-src 'self' data: blob:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="CIQ - クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:title" content="CIQ - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="og-image.png">
  <title>CIQ - サインイン</title>
  <script defer src="js/config.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="js/supabase_config.js"></script>
  <script defer src="js/supabase_client.js"></script>
  <script defer src="js/supabase_api.js?v=8"></script>
  <script defer src="js/crypto.js"></script>
  <script defer src="js/icons.js?v=3"></script>
    <script defer src="js/ui.js?v=4"></script>
  <script defer src="js/custom-select.js?v=4"></script>
  <script defer src="js/shared.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="css/design_system.css?v=31">
  <link rel="stylesheet" href="css/pages.css?v=45">

<body class="page-index">
  <h1>CIQ</h1>
  <div class="card">
    <div class="auth-page-header">
      <h2>ログイン</h2>
    </div>

    <div id="status-msg" class="status-msg-box" role="alert" aria-live="assertive"></div>

    <div id="supabase-auth-panel" class="auth-provider-panel" hidden>
      <div class="auth-provider-main">
        <div class="auth-provider-user" id="supabase-auth-user"></div>
      </div>
      <div class="auth-provider-actions">
        <button type="button" class="google-signin-btn" id="supabase-login-btn">
          <img class="google-signin-img" src="assets/vendor/google/web_light_rd_ctn.svg" alt="Googleで続行">
        </button>
        <button type="button" class="btn secondary" id="supabase-logout-btn" hidden>
          Googleからサインアウト
        </button>
      </div>
    </div>

    <div id="section-join" hidden>
      <div id="project-list" class="project-list">
      </div>
      <div class="scorer-join-panel">
        <div class="scorer-join-title"><span data-icon="user-check" aria-hidden="true"></span> 採点者参加</div>
        <label for="join-project-id">プロジェクトID</label>
        <input type="text" id="join-project-id" autocomplete="off" placeholder="例: ciq13" />
        <label for="join-scorer-code">パスワード</label>
        <input type="password" id="join-scorer-code" autocomplete="off" placeholder="管理者から共有されたパスワード" />
        <button type="button" class="btn secondary" id="join-scorer-btn">参加 <span data-icon="arrow-right-to-bracket" aria-hidden="true"></span></button>
      </div>
    </div>


  </div>
  <div class="index-help-link-wrap">
    <a href="create.html" class="index-help-link">
      <span data-icon="circle-plus" aria-hidden="true"></span> 新規作成
    </a>
    <a href="help.html" class="index-help-link">
      <span data-icon="circle-question" aria-hidden="true"></span> ヘルプ
    </a>
  </div>
  <script defer src="js/index.js?v=7"></script>
</body>
</html>
