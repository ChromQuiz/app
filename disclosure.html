<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'self'; img-src 'self' data: blob:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="CIQ - クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:title" content="CIQ - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="og-image.png">
    <title>CIQ - 成績照会</title>
    <script defer src="js/config.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="js/supabase_config.js"></script>
    <script defer src="js/supabase_client.js"></script>
    <script defer src="js/supabase_api.js?v=5"></script>
    <script defer src="js/crypto.js"></script>
    <script defer src="js/icons.js?v=3"></script>
    <script defer src="js/ui.js?v=4"></script>
    <script defer src="js/custom-select.js?v=4"></script>
    <script defer src="js/shared.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="css/design_system.css?v=30">
    <link rel="stylesheet" href="css/pages.css?v=40">
</head>
<body class="page-wrapper">
    <div class="page-container">
        <div class="page-logo">
            <span class="logo-icon"><span data-icon="chart-column" aria-hidden="true"></span></span>
            <h1 id="logo-title"><span data-icon="spinner" aria-hidden="true"></span> 読み込み中...</h1>
            <div class="logo-sub" id="logo-subtitle">成績照会</div>
        </div>

        <form class="page-card" id="login-card" novalidate>
            <div class="form-group">
                <label for="f-email"><span data-icon="envelope" aria-hidden="true"></span> メールアドレス</label>
                <input type="email" class="page-input" id="f-email" name="email" required autocomplete="email" placeholder="name@example.com" inputmode="email" pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$" title="メールアドレスの形式で入力してください">
            </div>
            <div class="form-group">
                <label for="pw-input"><span data-icon="key" aria-hidden="true"></span> パスワード</label>
                <input type="text" class="page-input" id="pw-input" name="password" maxlength="6" required autocomplete="off" placeholder="------">
            </div>
            <button type="submit" class="page-btn" id="submit-btn"><span data-icon="unlock" aria-hidden="true"></span> 成績を確認する</button>
            <div class="page-msg error" id="error-msg" role="alert" aria-live="assertive"></div>
        </form>

        <div class="page-card page-disabled is-disabled u-hidden" id="disabled-card" role="status">
            <span data-icon="lock" aria-hidden="true"></span>
            <h2 id="disabled-title">成績照会は現在停止中です</h2>
            <p id="disabled-detail" class="disclosure-disabled-detail">管理者が照会を開始するまでお待ちください。</p>
        </div>

        <div class="page-card result" id="result-card" role="region" aria-label="成績結果">
            <div class="result-header">
                <div class="result-name" id="result-name"></div>
                <div class="result-rank" id="result-rank"></div>
                <div class="result-score-line"><span class="result-score" id="result-score"></span><span class="result-score-unit">pts</span></div>
                <div class="result-streaks" id="result-streaks"></div>
            </div>

            <!-- SNS共有エリア -->
            <div id="share-area" class="u-hidden">
                <div id="share-preview"></div>
                <div class="share-buttons">
                    <button type="button" class="share-btn share-main" id="share-main-btn" title="シェア" aria-label="成績をシェア"><span data-icon="share-from-square" aria-hidden="true"></span></button>
                    <button type="button" class="share-btn share-download" id="share-download-btn" title="画像を保存" aria-label="成績画像をダウンロード"><span data-icon="download" aria-hidden="true"></span></button>
                </div>
            </div>

            <button type="button" class="back-nav-btn disclosure-back-btn" id="disclosure-back-btn"><span data-icon="chevron-left" aria-hidden="true"></span> 戻る</button>
        </div>

        <div class="page-footer">Powered by CIQ</div>
    </div>

    <script defer src="js/share_card.js?v=3"></script>
    <script defer src="js/disclosure.js?v=6"></script>
</body>
</html>
