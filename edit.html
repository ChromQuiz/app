<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'self'; img-src 'self' data: blob:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="CIQ - エントリー内容の編集">
    <title>CIQ - エントリー編集</title>
    <script defer src="js/config.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="js/supabase_config.js"></script>
    <script defer src="js/supabase_client.js"></script>
    <script defer src="js/supabase_api.js?v=5"></script>
    <script defer src="js/crypto.js"></script>
    <script defer src="js/icons.js?v=2"></script>
    <script defer src="js/ui.js?v=4"></script>
    <script defer src="js/custom-select.js?v=3"></script>
    <script defer src="js/shared.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="css/design_system.css?v=24">
    <link rel="stylesheet" href="css/pages.css?v=38">
</head>
<body class="page-wrapper">
    <div class="page-container">
        <div class="page-logo">
            <span class="logo-icon"><span data-icon="pen-to-square" aria-hidden="true"></span></span>
            <h1 id="edit-title"><span data-icon="spinner" aria-hidden="true"></span> 読み込み中...</h1>
            <div class="logo-sub" id="edit-subtitle">エントリー編集</div>
        </div>

        <!-- 認証フォーム -->
        <form class="page-card" id="auth-card" novalidate>
            <div class="form-group">
                <label for="f-email"><span data-icon="envelope" aria-hidden="true"></span> メールアドレス</label>
                <input type="email" class="page-input" id="f-email" name="email" required autocomplete="email" placeholder="name@example.com" inputmode="email" pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$" title="メールアドレスの形式で入力してください">
            </div>
            <div class="form-group">
                <label for="f-password"><span data-icon="key" aria-hidden="true"></span> パスワード</label>
                <input type="text" class="page-input" id="f-password" name="password" required autocomplete="off" placeholder="------">
            </div>
            <button type="submit" class="page-btn" id="auth-btn"><span data-icon="right-to-bracket" aria-hidden="true"></span> 認証してエントリーを編集</button>
            <div class="page-msg" id="auth-msg" role="status" aria-live="polite"></div>
        </form>

        <!-- 編集フォーム -->
        <form class="page-card u-hidden" id="edit-card" novalidate>
            <div class="entry-number-summary">
                <span data-icon="hashtag" aria-hidden="true"></span> 受付番号: <strong id="edit-entry-number"></strong>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="required" for="e-family-name">姓</label>
                    <input type="text" class="page-input" id="e-family-name" name="family-name" required autocomplete="family-name" placeholder="山田">
                </div>
                <div class="form-group">
                    <label class="required" for="e-first-name">名</label>
                    <input type="text" class="page-input" id="e-first-name" name="first-name" required autocomplete="given-name" placeholder="太郎">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="required" for="e-family-kana">セイ (全角カタカナ)</label>
                    <input type="text" class="page-input" id="e-family-kana" required placeholder="ヤマダ" pattern="^[ァ-ヴー]+$" title="全角カタカナで入力してください">
                </div>
                <div class="form-group">
                    <label class="required" for="e-first-kana">メイ (全角カタカナ)</label>
                    <input type="text" class="page-input" id="e-first-kana" required placeholder="タロウ" pattern="^[ァ-ヴー]+$" title="全角カタカナで入力してください">
                </div>
            </div>

            <div id="affiliation-section">
                <div class="form-row">
                    <div class="form-group u-flex-2">
                        <label class="required" for="e-affiliation"><span data-icon="school" aria-hidden="true"></span> 所属教育機関</label>
                        <input type="text" class="page-input" id="e-affiliation" name="organization" required autocomplete="organization" placeholder="○○高">
                        <div class="hint"><span data-icon="circle-info" aria-hidden="true"></span> 非公開を希望する場合は「非公開」と入力してください。</div>
                    </div>
                    <div class="form-group u-flex-1">
                        <label class="required" for="e-grade"><span data-icon="graduation-cap" aria-hidden="true"></span> 学年</label>
                        <select id="e-grade" class="custom-select" required>
                            <option value="">選択</option>
                            <option value="１年">１年</option>
                            <option value="２年">２年</option>
                            <option value="３年">３年</option>
                            <option value="４年">４年</option>
                            <option value="５年">５年</option>
                            <option value="６年">６年</option>
                            <option value="非表示">非表示</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="custom-checkbox" for="e-chubu">
                    <input type="checkbox" id="e-chubu">
                    <span class="checkbox-mark"><svg class="checkbox-svg" viewBox="0 0 16 16" aria-hidden="true"><path d="M3 8.5L6.5 12L13 4"></path></svg></span>
                    <div class="u-flex-1">
                        <span>所属教育機関は<strong>中部地方</strong>（愛知・岐阜・三重・静岡・長野・山梨・新潟・富山・石川・福井）にあります</span>
                    </div>
                </label>
            </div>

            <div class="form-group">
                <label class="required" for="e-entry-name"><span data-icon="id-badge" aria-hidden="true"></span> エントリーネーム</label>
                <input type="text" class="page-input" id="e-entry-name" required placeholder="エントリーシートでの表示名">
            </div>

            <div class="form-group">
                <fieldset class="choice-fieldset">
                    <legend class="required"><span data-icon="book-open" aria-hidden="true"></span> 記録集での本名使用</legend>
                    <div class="choice-row">
                        <label class="choice-option">
                            <input type="radio" name="e-record-name-permission" value="allow" required>
                            <span>許可する</span>
                        </label>
                        <label class="choice-option">
                            <input type="radio" name="e-record-name-permission" value="deny" required>
                            <span>許可しない</span>
                        </label>
                    </div>
                </fieldset>
            </div>

            <div class="form-group">
                <label for="e-message"><span data-icon="comment" aria-hidden="true"></span> 意気込み</label>
                <input type="text" class="page-input" id="e-message" placeholder="大会への意気込みをどうぞ！(公開されます)">
            </div>

            <div class="form-group">
                <label for="e-inquiry"><span data-icon="message" aria-hidden="true"></span> 運営への連絡</label>
                <textarea class="page-input" id="e-inquiry" placeholder="配慮事項などがあればご記入ください"></textarea>
            </div>

            <button type="submit" class="page-btn" id="save-btn"><span data-icon="floppy-disk" aria-hidden="true"></span> 変更を保存する</button>
            <div class="page-msg" id="edit-msg" role="status" aria-live="polite"></div>
        </form>

        <!-- 完了 -->
        <div class="page-card is-success u-hidden u-text-center" id="done-card" role="status">
            <span class="u-success-icon" data-icon="circle-check" aria-hidden="true"></span>
            <p class="u-complete-title">エントリー内容を更新しました</p>
        </div>

        <div class="page-footer">Powered by CIQ</div>
    </div>

    <script defer src="js/email.js?v=2"></script>
    <script defer src="js/edit.js?v=7"></script>
</body>
</html>
