<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'self'; img-src 'self' data: blob:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="CIQ - クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:title" content="CIQ - 解答採点プラットフォーム">
    <meta property="og:description" content="クイズ大会の解答採点を支援するウェブプラットフォーム">
    <meta property="og:type" content="website">
    <meta property="og:image" content="og-image.png">
    <title>CIQ - エントリーリスト</title>
    <script defer src="js/config.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="js/supabase_config.js"></script>
    <script defer src="js/supabase_client.js"></script>
    <script defer src="js/supabase_api.js?v=5"></script>
    <script defer src="js/icons.js?v=3"></script>
    <script defer src="js/ui.js?v=4"></script>
    <script defer src="js/custom-select.js?v=4"></script>
    <script defer src="js/shared.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="css/design_system.css?v=31">
    <link rel="stylesheet" href="css/pages.css?v=45">
</head>
<body class="page-wrapper page-entry-list">
    <div class="page-container full">
        <div class="page-logo">
            <span class="logo-icon"><span data-icon="list" aria-hidden="true"></span></span>
            <h1 id="page-title"><span data-icon="spinner" aria-hidden="true"></span> 読み込み中...</h1>
            <div class="logo-sub" id="page-subtitle">エントリーリスト</div>
        </div>

        <div id="content-area" class="u-hidden">
            <div class="u-text-center">
                <div class="stat-badge entry-count-badge glass-panel" role="status" aria-live="polite">
                    <span class="entry-count-main"><span class="stat-val" id="total-count">-</span><span class="entry-count-unit">名</span></span>
                    <span class="stat-label"><span data-icon="user-check" aria-hidden="true"></span> エントリー済</span>
                </div>
            </div>

            <div class="list-container">
                <table>
                    <caption class="u-hidden">エントリー一覧</caption>
                    <thead>
                        <tr>
                            <th scope="col"><span data-icon="trophy" aria-hidden="true"></span> 優先順位</th>
                            <th scope="col"><span data-icon="calendar" aria-hidden="true"></span> エントリー日時</th>
                            <th scope="col"><span data-icon="school" aria-hidden="true"></span> 所属</th>
                            <th scope="col"><span data-icon="graduation-cap" aria-hidden="true"></span> 学年</th>
                            <th scope="col"><span data-icon="id-badge" aria-hidden="true"></span> エントリーネーム</th>
                            <th scope="col"><span data-icon="comment" aria-hidden="true"></span> 意気込み</th>
                            <th scope="col"><span data-icon="map-location-dot" aria-hidden="true"></span> 中部</th>
                        </tr>
                    </thead>
                    <tbody id="list-body">
                        <tr><td colspan="7" class="entry-list-loading-cell"><span data-icon="spinner" aria-hidden="true"></span> 読み込み中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="page-card page-disabled is-disabled" id="disabled-msg" role="status">
            <span data-icon="lock" aria-hidden="true"></span>
            現在エントリーリストは非公開です。
        </div>

        <div class="page-footer">Powered by CIQ</div>
    </div>

    <script defer src="js/entry_list.js?v=6"></script>
</body>
</html>
