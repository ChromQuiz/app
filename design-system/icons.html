<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>CIQ Symbols — アイコンギャラリー</title>
    <script defer src="../js/icons.js?v=6"></script>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #f5f5f7;
            --cell: #ffffff;
            --ink: #1d1d1f;
            --muted: #86868b;
            --line: rgba(0, 0, 0, .08);
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #161617; --cell: #1d1d1f; --ink: #f5f5f7; --muted: #86868b; --line: rgba(255, 255, 255, .1); }
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 24px;
            background: var(--bg);
            color: var(--ink);
            font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
        }
        header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        h1 { font-size: 20px; margin: 0; }
        .meta { color: var(--muted); font-size: 13px; }
        label.ctl { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
            gap: 10px;
        }
        .cell {
            background: var(--cell);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 14px 8px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .sizes { display: flex; align-items: center; gap: 12px; }
        .name {
            font-size: 11px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: var(--muted);
            text-align: center;
            word-break: break-all;
        }
        .cat {
            grid-column: 1 / -1;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            margin-top: 14px;
            text-transform: uppercase;
            letter-spacing: .05em;
        }
    </style>
</head>
<body>
    <header>
        <h1>CIQ Symbols</h1>
        <span class="meta" id="count"></span>
        <label class="ctl">stroke
            <input type="range" id="stroke" min="1.4" max="2.0" step="0.05">
            <span id="stroke-val"></span>
        </label>
    </header>
    <div class="grid" id="grid"></div>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('grid');
            const names = Object.keys(ICON_PATHS);
            document.getElementById('count').textContent = `${names.length} symbols`;

            names.forEach((name) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const sizes = document.createElement('div');
                sizes.className = 'sizes';
                [16, 24, 32].forEach((size) => sizes.appendChild(createIcon(name, { size })));
                const label = document.createElement('div');
                label.className = 'name';
                label.textContent = name;
                cell.append(sizes, label);
                grid.appendChild(cell);
            });

            const slider = document.getElementById('stroke');
            const valEl = document.getElementById('stroke-val');
            const current = grid.querySelector('svg[stroke-width]');
            slider.value = current ? current.getAttribute('stroke-width') : '1.7';
            const apply = () => {
                valEl.textContent = slider.value;
                grid.querySelectorAll('svg[stroke-width]').forEach((svg) => svg.setAttribute('stroke-width', slider.value));
            };
            slider.addEventListener('input', apply);
            apply();
        });
    </script>
</body>
</html>
