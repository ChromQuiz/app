<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>C1 コアマーク レビューギャラリー</title>
<style>
  body { margin: 0; font-family: -apple-system, system-ui, sans-serif; font-size: 12px; }
  .panel { padding: 12px 16px; }
  .panel.light { background: #fff; color: #1c1c1e; }
  .panel.dark { background: #1c1c1e; color: #f2f2f7; }
  h2 { font-size: 13px; margin: 4px 0 8px; }
  table { border-collapse: collapse; }
  th, td { padding: 3px 10px; text-align: center; vertical-align: middle; }
  th { font-weight: 500; opacity: .6; font-size: 10px; }
  td.name { text-align: left; font-family: ui-monospace, monospace; font-size: 10px; }
  td span[data-icon] { display: inline-block; line-height: 0; }
  canvas { image-rendering: pixelated; vertical-align: middle; background: transparent; }
  .ctx { margin-top: 8px; font-size: 13px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .ctx span[data-icon] { vertical-align: -3px; }
</style>
<script src="js/icons.js" defer></script>
</head>
<body>
<div class="panel light" id="light"></div>
<div class="panel dark" id="dark"></div>
<script>
const KEYS = [
  'chevron-right','chevron-left','chevron-down','arrow-right','arrow-left',
  'xmark','plus','minus','check','check-double','ellipsis','line-3-horizontal',
  'hashtag','percent','percent-ring','home',
];

function buildPanel(root, mode) {
  const h = document.createElement('h2');
  h.textContent = mode === 'light' ? 'Light (16 / 24 / 32 / 16px実ピクセル拡大)' : 'Dark (16 / 24 / 32 / 16px実ピクセル拡大)';
  root.appendChild(h);
  const table = document.createElement('table');
  KEYS.forEach((key) => {
    const tr = document.createElement('tr');
    const name = document.createElement('td');
    name.className = 'name';
    name.textContent = key;
    tr.appendChild(name);
    [16, 24, 32].forEach((size) => {
      const td = document.createElement('td');
      td.appendChild(window.createIcon(key, { size }));
      tr.appendChild(td);
    });
    const magTd = document.createElement('td');
    magTd.dataset.magKey = key;
    tr.appendChild(magTd);
    table.appendChild(tr);
  });
  root.appendChild(table);
  const ctx = document.createElement('div');
  ctx.className = 'ctx';
  ctx.innerHTML = '文中比較:';
  ['chevron-down','check','xmark','plus','home','percent'].forEach((k) => {
    const w = document.createElement('span');
    w.appendChild(window.createIcon(k, { size: 16 }));
    w.appendChild(document.createTextNode(' ラベル'));
    ctx.appendChild(w);
  });
  root.appendChild(ctx);
}

function magnify(td, key, color) {
  const svg = window.createIcon(key, { size: 16 });
  svg.setAttribute('width', 16);
  svg.setAttribute('height', 16);
  const xml = new XMLSerializer().serializeToString(svg).replaceAll('currentColor', color);
  const img = new Image();
  img.onload = () => {
    const small = document.createElement('canvas');
    small.width = 16; small.height = 16;
    small.getContext('2d').drawImage(img, 0, 0, 16, 16);
    const big = document.createElement('canvas');
    big.width = 128; big.height = 128;
    const bctx = big.getContext('2d');
    bctx.imageSmoothingEnabled = false;
    bctx.drawImage(small, 0, 0, 128, 128);
    big.style.width = '96px';
    big.style.height = '96px';
    td.appendChild(big);
  };
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(xml);
}

window.addEventListener('DOMContentLoaded', () => {
  // percent のリング比較案（ギャラリー限定・レジストリ非改変の一時キー）
  const solidPercent = window.ICON_PATHS['percent'].paths;
  window.ICON_PATHS['percent-ring'] = { paths: [
    { d: 'M7 7m-2.95 0a2.95 2.95 0 1 0 5.9 0a2.95 2.95 0 1 0 -5.9 0M7 7m-1.35 0a1.35 1.35 0 1 0 2.7 0a1.35 1.35 0 1 0 -2.7 0', fillRule: 'evenodd' },
    { d: 'M17 17m-2.95 0a2.95 2.95 0 1 0 5.9 0a2.95 2.95 0 1 0 -5.9 0M17 17m-1.35 0a1.35 1.35 0 1 0 2.7 0a1.35 1.35 0 1 0 -2.7 0', fillRule: 'evenodd' },
    solidPercent[2],
  ] };
  buildPanel(document.getElementById('light'), 'light');
  buildPanel(document.getElementById('dark'), 'dark');
  document.querySelectorAll('#light [data-mag-key]').forEach((td) => magnify(td, td.dataset.magKey, '#000'));
  document.querySelectorAll('#dark [data-mag-key]').forEach((td) => magnify(td, td.dataset.magKey, '#fff'));
});
</script>
</body>
</html>
